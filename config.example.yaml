# imprint rendering config — your house style, NOT what any document says.
#
# This file holds reusable render-level settings: the theme, fonts, the logo, and
# the default toggles — applied to every document you render. Document-specific
# metadata — title, author, footer text, recipient, date, category — lives in each
# document's front matter (or a CLI flag), never here.
#
# Copy this to one of (first found wins):
#   $IMPRINT_CONFIG                 # explicit path via env var
#   ~/.config/imprint/config.yaml   # recommended for an installed imprint
#   ./config.yaml                 # repo-local (gitignored), handy for dev
#
# Multiple orgs/brands? Copy this to ~/.config/imprint/profiles/<name>.yaml (or run
# `make profile NAME=<name>`) and select it per render with `imprint --profile <name>`
# (or default a shell with IMPRINT_PROFILE=<name>). A profile's logo path resolves
# next to the profile file, so keep each profile's assets beside it.
#
# Every value is a DEFAULT. A document's front matter or a CLI flag overrides it.
# All keys are optional; imprint renders fine with no config at all.

# --- Theme ---
accent:        "#2563EB"     # the single accent color (technical blue). Try #1D4ED8, #4F46E5, #0D9488 …
# Bundled families (set the names below to switch):
#   sans — "Source Sans 3" (default) or "IBM Plex Sans"
#   mono — "JetBrains Mono"
# For a custom face (e.g. a brand typeface), drop its TTFs into
# ~/.config/imprint/fonts/ and name the family here — imprint searches that dir in
# addition to the bundled fonts. (Rendering ignores system fonts, so the TTFs must
# live there.)
font_body:     "Source Sans 3"
font_head:     "Source Sans 3"
font_mono:     "JetBrains Mono"

# --- Logo (house style: your brand on every document) ---
# The logo is reusable branding, like the accent, so it can live here as a default
# and appears on the cover and in the running header of every PDF. A path is
# resolved relative to THIS config file (so keep the asset next to your config, or
# use an absolute path). A document overrides it in front matter (resolved relative
# to the .md), drops it with `logo: none`, or pass --no-logo for one run.
# logo:         "logo.svg"           # cover + running-header mark
# logo_dark_bg: "logo-dark-bg.svg"   # logo for a dark background; used only on the gradient cover
# logo_height:  40                   # cover logo height, in pt

# --- Default toggles (a document's front matter / CLI can flip these per file) ---
cover:         false         # title page OFF by default; set true or pass --cover
cover_style:   light         # look of the cover when shown: "light" (default) or "gradient" (an accent wash); needs cover: true
confidential:  false         # adds a "Confidential" marker when true
toc:           false         # table of contents OFF by default; set true or pass --toc (page numbers Markdown can't carry)
numbered:      false         # section numbering OFF by default; set true or pass --numbered (render-only, your headings are untouched)

# --- Typesetting ---
# lang: body language (BCP 47) — drives hyphenation + justification; default "en".
# lang:          "en"        # e.g. "en-GB", "de", "fr"
# code_font_size: block-code size in pt; default keeps the built-in 0.92em.
# code_font_size: 8.5

# --- Custom template (optional) ---
# The bundled default.typ is used unless you name your own Typst template here. The
# path resolves relative to THIS file (keep it beside your config/profile), or use
# an absolute path; a document overrides it with `template:` or --template. A custom
# template gets every key above as a variable, plus any extra scalar key you add to
# front matter or config (a `version`, a `client`, …) — unrecognized keys are passed
# straight through, so a new field needs no change to imprint.
# template:     "house.typ"
