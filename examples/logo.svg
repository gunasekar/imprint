<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 64" role="img" aria-label="imprint">
  <!-- Default palette: accent #2563EB, soft #BFD4FB, ink #111827 -->
  <!-- Document-pages mark: a back sheet peeking behind a front sheet -->
  <rect x="24" y="12" width="24" height="38" rx="3" fill="#BFD4FB"/>
  <rect x="14" y="16" width="26" height="40" rx="4" fill="#2563EB"/>
  <!-- Text lines on the front sheet -->
  <rect x="19" y="25" width="16" height="2.6" rx="1.3" fill="#FFFFFF"/>
  <rect x="19" y="31" width="16" height="2.6" rx="1.3" fill="#FFFFFF"/>
  <rect x="19" y="37" width="11" height="2.6" rx="1.3" fill="#FFFFFF"/>
  <!-- Wordmark lockup: ink "im" + accent "print" -->
  <text x="60" y="43" font-family="IBM Plex Sans, Source Sans 3, sans-serif"
        font-size="30" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#111827">im</tspan><tspan fill="#2563EB">print</tspan>
  </text>
</svg>
